<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Project Signal Personal</title>
  <link rel="stylesheet" href="./src/ui/styles.css" />
  <link rel="stylesheet" href="./src/ui/avatars.css" />
</head>
<body>
  <main id="app">
    <section id="game-frame">

      <!-- 타이틀 화면 -->
      <section id="title-screen" hidden>
        <div id="title-inner">
          <p id="title-kicker">개인 공방 / Auto-Battle</p>
          <h1 id="title-name">Project Signal Personal</h1>
          <p id="title-tagline">초보자의 길 — 너의 선택으로 강해진다.</p>
          <button id="title-start" type="button">시작하기</button>
          <!-- Job Codex Entry Foundation: 직업 도감(관람용 창구) -->
          <button id="title-codex" type="button">직업 도감</button>
        </div>
      </section>

      <!-- Job Codex Entry Foundation: SR-01~24 직업/아바타 관람 화면 (선택/시작 기능 아님) -->
      <section id="codex-screen" class="av-stage" hidden>
        <div id="codex-inner"></div>
      </section>

      <!-- Game Flow 01 → Fusion Flow 01: 직업 선택 + 배치 화면
           기본 6직업 중 3명 선택 → 전열2/후열2 슬롯 배치 → 모험 시작.
           30종 확장은 카드 추가만으로 가능. 배치 상태는 main.js가 관리. -->
      <section id="job-select" hidden>
        <div id="job-select-inner">
          <p id="job-kicker">초보자의 길</p>
          <h2 id="job-heading">동료 3명을 선택하세요</h2>
          <!-- Combat Readability Polish 02: data-avatar = 전투 유닛과 같은 avatarKey 참조 hook
               (.job-ava.avatar-{key} placeholder — 추후 루다 아바타를 카드/전투 공통 적용) -->
          <!-- Avatar Import 01: data-avatar 칩 placeholder → SR 아바타 미니(.av-stage 컨텍스트).
               figure 마크업은 main.js가 avatarFigureHTML로 주입한다(직업카드/전투 공통 키). -->
          <div id="job-grid" class="av-stage">
            <button type="button" class="job-card" data-job="warrior" data-avatar="warrior">
              <span class="job-ava" aria-hidden="true"></span>
              <span class="job-name">전사</span><span class="job-role">전열 공격</span>
            </button>
            <button type="button" class="job-card" data-job="guardian" data-avatar="guardian">
              <span class="job-ava" aria-hidden="true"></span>
              <span class="job-name">수호자</span><span class="job-role">보호 담당</span>
            </button>
            <button type="button" class="job-card" data-job="archer" data-avatar="archer">
              <span class="job-ava" aria-hidden="true"></span>
              <span class="job-name">궁수</span><span class="job-role">후열 저격</span>
            </button>
            <button type="button" class="job-card" data-job="priest" data-avatar="priest">
              <span class="job-ava" aria-hidden="true"></span>
              <span class="job-name">사제</span><span class="job-role">회복 지원</span>
            </button>
            <button type="button" class="job-card" data-job="cleric" data-avatar="cleric">
              <span class="job-ava" aria-hidden="true"></span>
              <span class="job-name">신관</span><span class="job-role">후열 지원</span>
            </button>
            <button type="button" class="job-card" data-job="trickster" data-avatar="trickster">
              <span class="job-ava" aria-hidden="true"></span>
              <span class="job-name">교란꾼</span><span class="job-role">후열 교란</span>
            </button>
          </div>
          <p id="formation-hint">배치 — 슬롯을 눌러 위치를 바꿀 수 있어요</p>
          <div id="formation-grid">
            <button type="button" class="form-slot-box" data-slot="f0"><span class="slot-name">전열 1</span><span class="slot-job">—</span></button>
            <button type="button" class="form-slot-box" data-slot="f1"><span class="slot-name">전열 2</span><span class="slot-job">—</span></button>
            <button type="button" class="form-slot-box" data-slot="b0"><span class="slot-name">후열 1</span><span class="slot-job">—</span></button>
            <button type="button" class="form-slot-box" data-slot="b1"><span class="slot-name">후열 2</span><span class="slot-job">—</span></button>
          </div>
          <button id="job-start" type="button" disabled>모험 시작</button>
        </div>
      </section>

      <!-- Fusion Flow Foundation 01: 합체 화면 (S3/S8 클리어 후) -->
      <section id="fusion-panel" class="flow-panel" hidden>
        <div id="fusion-body"></div>
      </section>

      <!-- Fusion Moment Foundation 01: 합체 결과(탄생) 확인 화면 -->
      <section id="fusion-result-panel" class="flow-panel av-stage" hidden>
        <div id="fusion-result-body"></div>
      </section>

      <!-- Fusion Flow Foundation 01: 동료 영입 화면 (S3 합체 후 / S5 클리어 후) -->
      <section id="recruit-panel" class="flow-panel av-stage" hidden>
        <div id="recruit-body"></div>
      </section>

      <!-- Party & Formation Integrity 01 보강: 재배치 화면 (합체+영입/4인 확장 후) -->
      <section id="arrange-panel" class="flow-panel" hidden>
        <div id="arrange-body"></div>
      </section>

      <!-- 보상 선택 화면 (Reward & Growth 01: 버튼은 REWARDS 데이터에서 렌더) -->
      <section id="growth-panel" hidden>
        <div id="growth-stage-label"></div>
        <div id="growth-subtitle"></div>
        <div id="growth-choices"></div>
        <p id="growth-log"></p>
      </section>

      <!-- 전투 화면 -->
      <div id="battle-view">
        <header id="top-hud">
          <div id="stage-label">Stage 1</div>
          <div id="hud-right">
            <span id="status-label">ready</span>
            <button id="speed-toggle" type="button" aria-label="전투 배속">1x</button>
            <button id="to-title-btn" type="button" aria-label="타이틀로">타이틀</button>
          </div>
        </header>

        <div id="party-bonus" hidden></div>

        <!-- Combat Breath Preview 01: 개발/프리뷰용 전투 장면 선택 (정식 콘텐츠 아님) -->
        <div id="preview-bar" aria-label="프리뷰 장면">
          <span class="preview-tag">PREVIEW</span>
          <button type="button" data-preview="normal-max">다수전</button>
          <button type="button" data-preview="elite-mix">정예</button>
          <button type="button" data-preview="boss-solo">보스</button>
          <button type="button" data-preview="signal">신호</button>
          <button type="button" data-preview="default">기본</button>
        </div>

        <section id="battle-field">
          <span class="team-label enemy">enemy side</span>
          <span class="team-label party">party side</span>
          <!-- Combat Readability Polish 02: 보스/정예 전용 정보 HUD (중앙 상단) -->
          <div id="encounter-hud" hidden></div>
          <div id="log-overlay" hidden></div>
          <div id="unit-layer"></div>
          <div id="fx-layer"></div>
        </section>

        <!-- 결과 오버레이 (전투 종료 시에만) -->
        <div id="result-overlay" hidden>
          <div id="result-card">
            <div id="result-title"></div>
            <div class="result-actions">
              <button id="result-restart" type="button"></button>
              <button id="result-title-btn" type="button">타이틀로</button>
            </div>
          </div>
        </div>
      </div>

    </section>
  </main>
  <script type="module" src="./src/core/main.js"></script>
</body>
</html>
