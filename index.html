<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Project Signal Personal</title>
  <link rel="stylesheet" href="./src/ui/styles.css" />
</head>
<body>
  <main id="app">
    <section id="game-frame">

      <header id="top-hud">
        <div id="stage-label">Stage 1</div>
        <div id="status-label">Ready</div>
      </header>

      <section id="battle-field">
        <div id="enemy-side"></div>
        <div id="party-side"></div>
      </section>

      <section id="battle-log">
        <ul id="log-list"></ul>
      </section>

      <footer id="bottom-panel">
        <button id="start-button">전투 시작</button>
      </footer>

    </section>
  </main>
  <script type="module" src="./src/core/main.js"></script>
</body>
</html>
